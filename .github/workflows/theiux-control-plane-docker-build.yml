name: Theiux Control Plane Docker Build

on:
  pull_request:
    branches: ["main"]
    paths:
      - "theiux-control-plane/**"
      - ".github/workflows/theiux-control-plane-docker-build.yml"
  push:
    branches: ["main", "feature/**"]
    paths:
      - "theiux-control-plane/**"
      - ".github/workflows/theiux-control-plane-docker-build.yml"
  workflow_dispatch:

concurrency:
  group: control-plane-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: theiux-control-plane/backend
            dockerfile: theiux-control-plane/backend/Dockerfile
          - name: frontend
            context: theiux-control-plane/frontend
            dockerfile: theiux-control-plane/frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
