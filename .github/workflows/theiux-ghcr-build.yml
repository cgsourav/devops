name: Build theiux image to GHCR

on:
  push:
    branches: ["main"]
    paths:
      - "theiux/**"
      - ".github/workflows/theiux-ghcr-build.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: theiux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare apps payload
        id: apps
        run: |
          set -euo pipefail
          if [ -f "apps.json" ]; then
            echo "apps_json_base64=$(base64 -w0 apps.json)" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.APPS_JSON_BASE64 }}" ]; then
            echo "apps_json_base64=${{ vars.APPS_JSON_BASE64 }}" >> "$GITHUB_OUTPUT"
          else
            echo "apps_json_base64=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./theiux
          file: ./theiux/docker/frappe/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/theiux-frappe:main
            ghcr.io/${{ github.repository_owner }}/theiux-frappe:${{ github.sha }}
          build-args: |
            PYTHON_VERSION=${{ vars.PYTHON_VERSION || '3.11' }}
            NODE_VERSION=${{ vars.NODE_VERSION || '20' }}
            WKHTMLTOPDF_VERSION=${{ vars.WKHTMLTOPDF_VERSION || '0.12.6.1-3' }}
            APPS_JSON_BASE64=${{ steps.apps.outputs.apps_json_base64 }}
          secrets: |
            github_pat=${{ secrets.GH_APP_SOURCE_PAT }}
