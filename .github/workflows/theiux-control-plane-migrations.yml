name: Theiux Control Plane Migration Check

on:
  pull_request:
    branches: ["main"]
    paths:
      - "theiux-control-plane/backend/**"
      - ".github/workflows/theiux-control-plane-migrations.yml"
  push:
    branches: ["main", "feature/**"]
    paths:
      - "theiux-control-plane/backend/**"
      - ".github/workflows/theiux-control-plane-migrations.yml"
  workflow_dispatch:

concurrency:
  group: control-plane-migrations-${{ github.ref }}
  cancel-in-progress: true

jobs:
  alembic-upgrade:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: theiux
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d theiux"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: theiux-control-plane/backend
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/theiux
      REDIS_URL: redis://127.0.0.1:6379/0
      JWT_SECRET: ci-jwt-secret
      THEIUX_CLI_PATH: /usr/bin/echo
      ALLOWED_RUNTIME_VERSIONS: "python:3.11,node:20,go:1.22,ruby:3.3"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: theiux-control-plane/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run alembic migrations
        run: alembic upgrade head

